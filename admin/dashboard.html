<!DOCTYPE html>
<html>

<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>

<body>
  <h2>Bookings</h2>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Name</th>
        <th>Date & Time</th>
        <th>Hairstyle</th>
        <th>Hairdresser</th>
        <th>POP</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="list">
      <tr><td colspan="6">Loading...</td></tr>
    </tbody>
  </table>

  <script type="module">
    import { db, app } from "../js/firebase.js";

    import {
      collection,
      getDocs,
      addDoc,
      doc,
      getDoc,
      deleteDoc,
      updateDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const auth = getAuth(app);
    const list = document.getElementById("list");

    console.log("PROJECT:", db.app.options.projectId);

    // ========================
    // ACTIONS
    // ========================

    window.deleteBooking = async (id) => {
      await deleteDoc(doc(db, "bookings", id));
      location.reload();
    };

    window.rejectBooking = async (id) => {
      const bookingRef = doc(db, "bookings", id);
      const snap = await getDoc(bookingRef);
      const booking = snap.data();

      if (!booking) return alert("Booking not found");

      const reason = prompt(
        `Reason for rejecting ${booking.firstName}?`,
        "Unfortunately your booking could not be accepted."
      );

      if (!reason) return;

      // WhatsApp
      const message = `
Hi ${booking.firstName} ${booking.lastName}
${reason}
Please choose another date.
`;
      window.open(`https://wa.me/${booking.phone}?text=${encodeURIComponent(message)}`);

      // Save rejection
      await addDoc(collection(db, "confirmedBookings"), {
        ...booking,
        rejected: true,
        rejectionReason: reason,
        rejectedAt: serverTimestamp()
      });

      await updateDoc(bookingRef, { rejected: true });

      location.reload();
    };

    window.acceptBooking = async (id, button) => {
      button.disabled = true;
      button.textContent = "Processing...";

      const bookingRef = doc(db, "bookings", id);
      const snap = await getDoc(bookingRef);
      const booking = snap.data();

      if (!booking) return alert("Booking not found");

      // Save confirmed booking
      await addDoc(collection(db, "confirmedBookings"), {
        ...booking,
        confirmedAt: serverTimestamp()
      });

      // Block date
      await addDoc(collection(db, "confirmedDates"), {
        date: booking.date,
        service: booking.hairstyle
      });

      // Update original
      await updateDoc(bookingRef, { confirmed: true });

      // WhatsApp
      const message = `
Hi ${booking.firstName} ${booking.lastName}

Your booking is CONFIRMED
Service: ${booking.hairstyle}
Date: ${booking.date}

See you soon!
`;
      window.open(`https://wa.me/${booking.phone}?text=${encodeURIComponent(message)}`);

      setTimeout(() => location.reload(), 1000);
    };

    // ========================
    // LOAD DATA (FIXED PART)
    // ========================

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      console.log("✅ Logged in:", user.email);

      try {
        const snapshot = await getDocs(collection(db, "bookings"));

        console.log("📦 Bookings:", snapshot.size);

        list.innerHTML = "";

        if (snapshot.empty) {
          list.innerHTML = "<tr><td colspan='6'>No bookings found</td></tr>";
          return;
        }

        snapshot.forEach(docSnap => {
          const b = docSnap.data();

          const isConfirmed = b.confirmed;
          const isRejected = b.rejected;

          list.innerHTML += `
            <tr>
              <td>${b.firstName} ${b.lastName}</td>
              <td>${b.date} - ${b.time}</td>
              <td>${b.hairstyle}</td>
              <td>${b.hairdresser}</td>
              <td><a href="${b.popUrl}" target="_blank">View POP</a></td>
              <td>
                <button onclick="acceptBooking('${docSnap.id}', this)" ${isConfirmed ? "disabled" : ""}>
                  ${isConfirmed ? "Confirmed ✅" : "Accept"}
                </button>

                <button onclick="rejectBooking('${docSnap.id}')" ${isRejected ? "disabled" : ""}>
                  ${isRejected ? "Rejected ❌" : "Reject"}
                </button>

                <button onclick="deleteBooking('${docSnap.id}')">Delete</button>
              </td>
            </tr>
            `;
        });

      } catch (err) {
        console.error("🔥 Firestore error:", err);
        list.innerHTML = "<tr><td colspan='6'>Error loading bookings</td></tr>";
      }
    });
  </script>
</body>

</html>
