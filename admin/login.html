<!DOCTYPE html>
<html>

<head>
  <title>Admin Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 40px;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #000;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      background: black;
      color: white;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <h2>Admin Login</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>
  </div>

  <script type="module">
    import { login } from "../js/auth.js";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await login(email, password);
        window.location.href = "/admin/dashboard.html";
      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    });
  </script>

</body>
</html>
